<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wall Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Wall Editor</h2>

  <div class="topnote">
    <h3>Палитра:</h3>
    <ul>
      <li><button type="button" class="swatch" style="background: #7a4b2a">1</button> — обычная стена</li>
      <li><button type="button" class="swatch" style="background: #2a7fff">2</button> — исчезающая</li>
      <li><button type="button" class="swatch" style="background: #2ecc71">4</button> — батут</li>
      <li><button type="button" class="swatch" style="background: #a855f7">5</button> — двигает персонажа ↕</li>
      <li><button type="button" class="swatch" style="background: #f1c40f">6</button> — двигает персонажа ↔</li>
      <li><button type="button" class="swatch" style="background: #e67e22">7</button> — движется ↕</li>
      <li><button type="button" class="swatch" style="background: #e74c3c">8</button> — движется ↓</li>
    </ul>
    <p>Кликни по цвету сверху и рисуй им по сетке.</p>
  </div>

  <div class="tools">
    <label>Ширина: <input id="w" type="number" value="20" min="1" max="500"></label>
    <label>Высота: <input id="h" type="number" value="12" min="1" max="500"></label>
    <label>Размер клетки: <input id="cell" type="number" value="32" min="8" max="64"></label>
    <button id="resizeBtn">Изменить размер</button>
    <button id="clearBtn">Очистить уровень</button>
    <button id="importJsonBtn">📥 Импорт JSON из текста</button>
    <button id="exportJsonBtn">📤 Экспорт JSON в текст</button>
    <button id="saveFileBtn">💾 Сохранить в файл</button>
    <button id="loadFileBtn">📂 Загрузить из файла</button>
    <input id="fileInput" type="file" accept=".json" style="display:none;">
    <span id="currentFileName" class="small" style="margin-left: 8px;"></span>
  </div>

  <div class="palette" id="palette"></div>
  <div class="levels" id="levels" style="margin-top:8px;"></div>

  <div class="row">
    <div class="canvasWrap"><canvas id="canvas"></canvas></div>
    <div class="panel">
      <textarea id="jsonArea" placeholder="JSON будет здесь..."></textarea>
      <div class="small">Формат данных:</div>
      <div class="json-format">
        <code>{"levels":[{"name":"Level 1","offsetY":0,"grid":[[1,0]]}]}</code>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
